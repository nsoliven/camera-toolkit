name: Bug report
description: Report reproducible incorrect behavior using synthetic or redacted data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not attach real API keys, photo metadata, private server addresses, or personal filesystem paths.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest safe reproduction using synthetic files.
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit
      description: Paste the commit hash or release version.
    validations:
      required: true
